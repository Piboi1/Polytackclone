<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Track Replica - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #33bbee; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px;
            pointer-events: none; border-left: 5px solid #00ff00;
        }
        .stat-label { font-size: 11px; color: #00ff00; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat-label">Velocity</div>
        <div id="speed" class="stat-value">0 km/h</div>
        <div class="stat-label">Status</div>
        <div id="status" class="stat-value">READY</div>
    </div>
    <div id="msg">WASD to Drive | SPACE to Jump | R to Reset</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.skypack.dev/three@0.160.0",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x33bbee);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -30, 0) });

        // --- 2. LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. TRACK ---
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, flatShading: true });
        function addTrack(w, h, d, x, y, z, rx=0, ry=0, rz=0) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), trackMat);
            mesh.position.set(x, y, z);
            mesh.rotation.set(rx, ry, rz);
            mesh.receiveShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) });
            body.position.set(x, y, z);
            body.quaternion.setFromEuler(rx, ry, rz);
            world.addBody(body);
        }

        addTrack(40, 2, 300, 0, -1, 0);          // Main Road
        addTrack(40, 2, 100, 0, 10, 180, 0.3);  // Big Jump Ramp
        addTrack(150, 2, 80, 0, -1, 350);       // Landing Zone

        // --- 4. CAR ---
        const carMesh = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.2, 4.5), new THREE.MeshStandardMaterial({ color: 0x00ff00, flatShading: true }));
        carMesh.castShadow = true;
        scene.add(carMesh);

        const carBody = new CANNON.Body({ 
            mass: 180, 
            shape: new CANNON.Box(new CANNON.Vec3(1.2, 0.6, 2.25)),
            position: new CANNON.Vec3(0, 5, 0)
        });
        world.addBody(carBody);

        // --- 5. CONTROLS ---
        const keys = { w:0, s:0, a:0, d:0, space:0 };
        window.addEventListener('keydown', e => { 
            const k = e.key.toLowerCase();
            if(k === ' ') keys.space = 1;
            else if(k in keys) keys[k] = 1;
            if(k === 'r') resetCar();
        });
        window.addEventListener('keyup', e => { 
            const k = e.key.toLowerCase();
            if(k === ' ') keys.space = 0;
            else if(k in keys) keys[k] = 0;
        });

        function resetCar() {
            carBody.position.set(0, 5, 0);
            carBody.velocity.set(0,0,0);
            carBody.angularVelocity.set(0,0,0);
            carBody.quaternion.set(0,0,0,1);
        }

        // --- 6. ANIMATION ---
        let isGrounded = false;
        const rayRes = new CANNON.RaycastResult();

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();

            // Ground Check
            const rayFrom = carBody.position;
            const down = new THREE.Vector3(0, -1, 0).applyQuaternion(carMesh.quaternion);
            const rayTo = new CANNON.Vec3(rayFrom.x + down.x*2, rayFrom.y + down.y*2, rayFrom.z + down.z*2);
            isGrounded = world.raycastClosest(rayFrom, rayTo, {}, rayRes);

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(carMesh.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(carMesh.quaternion);
            const speed = carBody.velocity.dot(new CANNON.Vec3(forward.x, forward.y, forward.z));

            if (isGrounded) {
                // Ground Logic
                if(keys.w) carBody.applyForce(new CANNON.Vec3(forward.x, forward.y, forward.z).scale(18000), carBody.position);
                if(keys.s) carBody.applyForce(new CANNON.Vec3(forward.x, forward.y, forward.z).scale(-10000), carBody.position);
                if(keys.space) carBody.applyImpulse(new CANNON.Vec3(0, 800, 0), carBody.position);

                carBody.angularVelocity.y = (keys.a - keys.d) * (Math.min(speed, 20) * 0.2);

                // Drift Friction
                const latVel = carBody.velocity.dot(new CANNON.Vec3(right.x, right.y, right.z));
                carBody.applyForce(new CANNON.Vec3(right.x, right.y, right.z).scale(-latVel * 150), carBody.position);
                
                document.getElementById('status').innerText = "GROUNDED";
            } else {
                // Air Logic (Pitch/Roll)
                if(keys.w) carBody.angularVelocity.addScaledVector(1.5, new CANNON.Vec3(right.x, right.y, right.z), carBody.angularVelocity);
                if(keys.s) carBody.angularVelocity.addScaledVector(-1.5, new CANNON.Vec3(right.x, right.y, right.z), carBody.angularVelocity);
                if(keys.a) carBody.angularVelocity.addScaledVector(1.5, new CANNON.Vec3(forward.x, forward.y, forward.z), carBody.angularVelocity);
                if(keys.d) carBody.angularVelocity.addScaledVector(-1.5, new CANNON.Vec3(forward.x, forward.y, forward.z), carBody.angularVelocity);
                
                document.getElementById('status').innerText = "AIRBORNE";
            }

            carMesh.position.copy(carBody.position);
            carMesh.quaternion.copy(carBody.quaternion);

            const cOffset = new THREE.Vector3(0, 6, 15).applyQuaternion(carMesh.quaternion);
            camera.position.lerp(carMesh.position.clone().add(cOffset), 0.1);
            camera.lookAt(carMesh.position);

            document.getElementById('speed').innerText = Math.abs(Math.round(speed * 3.6)) + " km/h";
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
